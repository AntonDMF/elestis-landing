<!doctype html>
<html lang="it">
<head>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Elestis — Work In Progress</title>
  <link rel="icon" type="image/png" href="elestis-favicon.png">
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #303534;
      color: #111;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .page {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .logo {

      width: min(260px, 78vw);
      height: auto;
      display: block;
      margin: 0 auto 28px;
    }

    .box {
      background: #f2f2f2;
      border: 1px solid #cfcfcf;
      border-radius: 18px;
      padding: 22px 24px;
      font-size: clamp(22px, 6vw, 34px);
      font-weight: 800;
      box-shadow: 0 8px 22px rgba(0,0,0,.22);
    }

  </style>
</head>
<body>
  <main class="page">
    <img src="assets/elestislogo.png" alt="Elestis Logo" class="logo">
    <div class="box">Work In Progress</div>
  </main>
</body>
</html>
